services:
  - type: web
    name: taborsynergy-agent
    runtime: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 30
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MODEL
        value: claude-sonnet-4-6
      - key: MAX_TOKENS
        value: 1024
      - key: DATABASE_URL
        sync: false           # set to Render PostgreSQL internal URL
      - key: BASE_URL
        value: https://aifrontdesk.taborsynergy.com
      - key: ALLOWED_ORIGINS
        value: "https://aifrontdesk.taborsynergy.com,https://taborsynergy-agent.onrender.com"
      - key: DEBUG_MODE
        value: "false"
      - key: SENTRY_DSN
        sync: false           # set in Render dashboard after creating Sentry project
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_DEFAULT_NUMBER
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_EMAIL
        value: admin@tabor.taborsynergy.com

# Keep-alive cron: pings health endpoint every 10 min to prevent Render free-tier sleep
cronJobs:
  - name: keep-alive
    runtime: python
    schedule: "*/10 * * * *"
    buildCommand: "echo 'keep-alive job'"
    startCommand: "python -c \"import urllib.request; urllib.request.urlopen('https://taborsynergy-agent.onrender.com/api/health')\""
