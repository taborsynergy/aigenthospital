services:
  - type: web
    name: taborsynergy-agent
    runtime: python
    buildCommand: pip install --upgrade pip && pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MODEL
        value: claude-sonnet-4-6
      - key: MAX_TOKENS
        value: 1024
      - key: DATABASE_URL
        value: sqlite:///./tabor_agent.db
      - key: BASE_URL
        value: https://aifrontdesk.taborsynergy.com
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_DEFAULT_NUMBER
        sync: false
