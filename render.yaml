services:
  - type: web
    name: taborsynergy-agent
    runtime: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install --prefer-binary -r requirements.txt
    # Workers scale with WEB_CONCURRENCY (default 1 on free tier). When raising it,
    # set ENABLE_SCHEDULER=false here and run the schedule from one place (GitHub
    # Actions cron) so background jobs don't fire once per worker.
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 30 --workers ${WEB_CONCURRENCY:-1}
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MODEL
        value: claude-sonnet-4-6
      - key: MAX_TOKENS
        value: 1024
      - key: DATABASE_URL
        sync: false           # set to Render PostgreSQL internal URL
      - key: BASE_URL
        value: https://aifrontdesk.taborsynergy.com
      - key: ALLOWED_ORIGINS
        value: "*"
        # Widget embed runs on clinic 3rd-party sites — must allow all origins.
        # API security is enforced via X-Clinic-Token header auth, not CORS.
      - key: DEBUG_MODE
        value: "false"
      - key: SENTRY_DSN
        sync: false           # set in Render dashboard after creating Sentry project
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_DEFAULT_NUMBER
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_EMAIL
        value: admin@tabor.taborsynergy.com

cronJobs:
  # Keep-alive: pings health endpoint every 10 min to prevent Render free-tier sleep
  - name: keep-alive
    runtime: python
    schedule: "*/10 * * * *"
    buildCommand: "echo 'keep-alive'"
    startCommand: "python -c \"import urllib.request; urllib.request.urlopen('https://taborsynergy-agent.onrender.com/api/health')\""

  # Appointment reminders: runs every hour, sends 72h + 24h SMS reminders
  # Requires ADMIN_PASSWORD env var (already set) + TWILIO_* credentials
  - name: appointment-reminders
    runtime: python
    schedule: "0 * * * *"
    buildCommand: "pip install requests --quiet"
    startCommand: >-
      python -c "
      import os, urllib.request, json;
      req = urllib.request.Request(
        'https://taborsynergy-agent.onrender.com/api/reminders/trigger',
        method='POST',
        headers={'X-Admin-Password': os.environ.get('ADMIN_PASSWORD',''), 'Content-Length': '0'}
      );
      r = urllib.request.urlopen(req);
      print('Reminders:', json.loads(r.read()))
      "

  # Recall campaigns: runs daily at 9am, sends recall SMS to lapsed patients
  # Only fires for Professional + Enterprise clinics with active campaigns
  - name: patient-recall
    runtime: python
    schedule: "0 9 * * *"
    buildCommand: "echo 'recall'"
    startCommand: >-
      python -c "
      import os, urllib.request, json;
      req = urllib.request.Request(
        'https://taborsynergy-agent.onrender.com/api/recall/trigger',
        method='POST',
        headers={'X-Admin-Password': os.environ.get('ADMIN_PASSWORD',''), 'Content-Length': '0'}
      );
      r = urllib.request.urlopen(req);
      print('Recall:', json.loads(r.read()))
      "
