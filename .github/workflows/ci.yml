name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Test ──────────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      ADMIN_PASSWORD:    test-admin-password
      ANTHROPIC_API_KEY: dummy-api-key
      DATABASE_URL:      sqlite:///./test.db
      MOCK_MODE:         "1"
      DEBUG_MODE:        "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check backend/ --select E,F,W --ignore E501

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── Deploy to Render (main only) ─────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy triggered:', d.get('id','unknown'))"
          else
            echo "RENDER_DEPLOY_HOOK not set — skipping auto-deploy"
          fi
