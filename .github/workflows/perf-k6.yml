name: Performance (k6 load test)

# GAP2-PERF-EXEC: executes the k6 load/stress/spike profile against a target
# (staging by default) so capacity is measured, not assumed. Manual trigger only
# — never run heavy load on production unintentionally.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Target base URL (use STAGING, not prod)"
        required: true
        default: "https://taborsynergy-agent.onrender.com"
      stage:
        description: "Scenario: load | stress | spike | soak"
        required: true
        default: "load"
      slug:
        description: "Clinic slug for the chat hot-path"
        required: true
        default: "demo"

jobs:
  k6:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run k6 (${{ github.event.inputs.stage }})
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          STAGE:    ${{ github.event.inputs.stage }}
          SLUG:     ${{ github.event.inputs.slug }}
        run: k6 run --summary-export=k6-summary.json perf/k6_load.js

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary-${{ github.event.inputs.stage }}
          path: k6-summary.json
